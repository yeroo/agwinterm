name: Release

# Tag a commit (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to build the
# installer and publish a GitHub Release with agwinterm-setup-<ver>.exe attached.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # for build-provenance attestation (free, keyless via Sigstore)
  attestations: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: ./installer/build.ps1

      - name: Build portable exe
        shell: pwsh
        run: ./installer/build-portable.ps1

      # Free, certless supply-chain signing: a Sigstore-backed attestation binding each artifact to
      # this commit + workflow. Verify with:  gh attestation verify <file> --repo yeroo/agwinterm
      # (Doesn't remove SmartScreen — that needs Authenticode, e.g. a SignPath Foundation OSS cert.)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            installer/Output/agwinterm-setup-*.exe
            installer/Output/agwinterm-portable-*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/agwinterm-setup-*.exe
            installer/Output/agwinterm-portable-*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Opens the version-bump PR to microsoft/winget-pkgs for each release. Runs as a job here
  # (not a `release:` workflow) because releases published with GITHUB_TOKEN don't trigger
  # other workflows. Needs the WINGET_TOKEN secret — a classic PAT with the public_repo
  # scope (used to fork winget-pkgs and open the PR); skips with a warning if unset.
  # The scoop bucket needs no equivalent: its Excavator updates itself on a schedule.
  winget:
    needs: installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    # Best-effort: a brand-new package can't be updated until its first version clears winget-pkgs
    # moderation, so this can legitimately fail early on — don't fail the whole release for it.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Submit manifest to winget-pkgs
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) { Write-Warning 'WINGET_TOKEN secret not set - skipping winget publish'; exit 0 }
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $url = "https://github.com/${{ github.repository }}/releases/download/v$version/agwinterm-setup-$version.exe"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update yeroo.agwinterm --version $version --urls $url --submit --token $env:WINGET_TOKEN

  # Packs and pushes the Chocolatey package to the community feed on each release. Every version
  # then goes through Chocolatey's moderation queue (automated validation + VM install test +
  # human review). Needs the CHOCO_API_KEY secret (from your community.chocolatey.org account);
  # skips with a warning if unset. Rewrites version + download URL + checksum in-place from the
  # release asset so the committed template can stay pinned at the last released version.
  chocolatey:
    needs: installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    # Best-effort: Chocolatey rejects new versions of a package whose first version is still in
    # moderation (403), so this can legitimately fail early on — don't fail the whole release for it.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Pack and push to Chocolatey
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          if (-not $env:CHOCO_API_KEY) { Write-Warning 'CHOCO_API_KEY secret not set - skipping chocolatey publish'; exit 0 }
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $asset = "agwinterm-portable-$version-win-x64.exe"
          $url = "https://github.com/${{ github.repository }}/releases/download/v$version/$asset"
          Invoke-WebRequest $url -OutFile $asset
          $sha = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          Push-Location packaging/chocolatey
          (Get-Content agwinterm.nuspec -Raw) -replace '(?<=<version>)[^<]+(?=</version>)', $version | Set-Content agwinterm.nuspec
          $ps = 'tools/chocolateyinstall.ps1'
          $c = Get-Content $ps -Raw
          $c = $c -replace 'download/v[^/]+/agwinterm-portable-[^'']+\.exe', "download/v$version/$asset"
          $c = $c -replace "checksum64\s+= '[0-9a-fA-F]+'", "checksum64     = '$sha'"
          Set-Content $ps $c
          choco pack --outputdirectory $env:RUNNER_TEMP
          choco push "$env:RUNNER_TEMP/agwinterm.$version.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          Pop-Location
